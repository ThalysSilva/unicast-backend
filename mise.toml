[tools]
go = "1.24"

[tasks.free-port-dev]
description = "Encerra processos escutando na porta do Postgres de desenvolvimento"
run = "./scripts/mise/free-port.sh dev"

[tasks.free-port-prod]
description = "Encerra processos escutando na porta do Postgres de producao"
run = "./scripts/mise/free-port.sh prod"

[tasks.compose-up-dev]
description = "Sobe os servicos docker do ambiente de desenvolvimento"
run = "docker compose --env-file .env.development -f docker-compose-dev.yaml up -d"

[tasks.compose-up-prod]
description = "Sobe os servicos docker do ambiente de producao"
run = "docker compose --env-file .env -f docker-compose.yaml up -d"

[tasks.compose-down-dev]
description = "Derruba os servicos docker do ambiente de desenvolvimento"
run = "docker compose --env-file .env.development -f docker-compose-dev.yaml down"

[tasks.compose-down-prod]
description = "Derruba os servicos docker do ambiente de producao"
run = "docker compose --env-file .env -f docker-compose.yaml down"

[tasks.migrate-dev]
description = "Executa migrations no banco local do ambiente de desenvolvimento"
env = { _.file = ".env.development" }
run = "./scripts/mise/migrate.sh"

[tasks.migrate-prod]
description = "Executa migrations no banco local do ambiente de producao"
env = { _.file = ".env" }
run = "./scripts/mise/migrate.sh"

[tasks.migrate-docker]
description = "Executa migrations dentro do container unicast-api"
env = { _.file = ".env" }
run = "./scripts/mise/migrate-docker.sh"

[tasks.bootstrap-dev]
description = "Fluxo completo: liberar porta, subir compose dev e aplicar migrations"
run = [
    "mise run free-port-dev",
    "mise run compose-up-dev",
    "mise run migrate-dev",
]

[tasks.bootstrap-prod]
description = "Fluxo completo: liberar porta, subir compose prod e aplicar migrations"
run = [
    "mise run free-port-prod",
    "mise run compose-up-prod",
    "mise run migrate-prod",
]

[tasks.seed]
description = "Executa a seed usando ENV_FILE e SEED_FILE"
run = "./scripts/mise/seed.sh direct"

[tasks.seed-local]
description = "Executa a seed localmente sobrescrevendo host/porta sem usar POSTGRES_DATABASE_URL"
run = "./scripts/mise/seed.sh local"

[tasks.seed-docker]
description = "Executa a seed SQL dentro do container postgres-unicast"
env = { _.file = ".env" }
run = "./scripts/mise/seed-docker.sh"
