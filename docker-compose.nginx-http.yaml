services:
  nginx-unicast-http:
    container_name: nginx-unicast-http
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NGINX_DOMAIN=${NGINX_DOMAIN}
      - FRONTEND_UPSTREAM=${FRONTEND_UPSTREAM:-http://host.docker.internal:3000}
      - API_UPSTREAM=${API_UPSTREAM:-http://unicast-api:8080}
    volumes:
      - ./nginx/templates-http:/etc/nginx/templates:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - unicast-network

networks:
  unicast-network:
    external: true
